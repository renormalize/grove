# Scale test setup preset — smaller real cluster + KWOK nodes + Pyroscope.

cluster:
  create: true
  worker_nodes: 0
  worker_memory: "300m"

scheduler:
  kai:
    enabled: true

grove:
  enabled: true
  profiling: true
  pcs_syncs: 20
  pcsg_syncs: 20
  pclq_syncs: 20

kwok:
  nodes: 100

pyroscope:
  enabled: true
