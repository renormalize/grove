# workload2-gt: slack between MinAvailable and replicas, so a single pod loss
# stays within tolerance. Standalone clique pc-a (replicas=2, min=1); scaling
# group sg-x (replicas=2, min=1) of cliques pc-b (replicas=1, min=1) and pc-c
# (replicas=3, min=1). 10 pods total; terminationDelay 10s. Containers run
# sleep infinity (busybox).
---
apiVersion: grove.io/v1alpha1
kind: PodCliqueSet
metadata:
  name: workload2-gt
  labels:
    app: workload2-gt
spec:
  replicas: 1
  template:
    terminationDelay: 10s
    cliques:
      - name: pc-a
        labels:
          kai.scheduler/queue: test
        spec:
          roleName: role-a
          replicas: 2
          minAvailable: 1
          podSpec:
            terminationGracePeriodSeconds: 5
            schedulerName: kai-scheduler
            affinity:
              nodeAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  nodeSelectorTerms:
                    - matchExpressions:
                        - key: node_role.e2e.grove.nvidia.com
                          operator: In
                          values:
                            - agent
            tolerations:
              - key: node_role.e2e.grove.nvidia.com
                operator: Equal
                value: agent
                effect: NoSchedule
            containers:
              - name: pc-a
                image: registry:5001/busybox:latest
                command: ["sleep", "infinity"]
                resources:
                  requests:
                    memory: 80Mi
      - name: pc-b
        labels:
          kai.scheduler/queue: test
        spec:
          roleName: role-b
          replicas: 1
          minAvailable: 1
          podSpec:
            terminationGracePeriodSeconds: 5
            schedulerName: kai-scheduler
            affinity:
              nodeAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  nodeSelectorTerms:
                    - matchExpressions:
                        - key: node_role.e2e.grove.nvidia.com
                          operator: In
                          values:
                            - agent
            tolerations:
              - key: node_role.e2e.grove.nvidia.com
                operator: Equal
                value: agent
                effect: NoSchedule
            containers:
              - name: pc-b
                image: registry:5001/busybox:latest
                command: ["sleep", "infinity"]
                resources:
                  requests:
                    memory: 80Mi
      - name: pc-c
        labels:
          kai.scheduler/queue: test
        spec:
          roleName: role-c
          replicas: 3
          minAvailable: 1
          podSpec:
            terminationGracePeriodSeconds: 5
            schedulerName: kai-scheduler
            affinity:
              nodeAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  nodeSelectorTerms:
                    - matchExpressions:
                        - key: node_role.e2e.grove.nvidia.com
                          operator: In
                          values:
                            - agent
            tolerations:
              - key: node_role.e2e.grove.nvidia.com
                operator: Equal
                value: agent
                effect: NoSchedule
            containers:
              - name: pc-c
                image: registry:5001/busybox:latest
                command: ["sleep", "infinity"]
                resources:
                  requests:
                    memory: 80Mi
    podCliqueScalingGroups:
      - name: sg-x
        replicas: 2
        minAvailable: 1
        cliqueNames:
          - pc-b
          - pc-c


