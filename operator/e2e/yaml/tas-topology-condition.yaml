# Workload: PCS TopologyLevelsUnavailable Condition Lifecycle
# Test scenario: PCS references a ClusterTopology that does not yet exist (tas20-topology).
# The ClusterTopology is created dynamically by the test after verifying the error condition.
---
apiVersion: grove.io/v1alpha1
kind: PodCliqueSet
metadata:
  name: tas-topology-condition
  labels:
    app: tas-topology-condition
spec:
  replicas: 0
  template:
    topologyConstraint:
      topologyName: tas20-topology
      packDomain: rack
    cliques:
      - name: worker
        labels:
          kai.scheduler/queue: test
        spec:
          roleName: worker
          replicas: 2
          minAvailable: 2
          podSpec:
            terminationGracePeriodSeconds: 5
            schedulerName: kai-scheduler
            affinity:
              nodeAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  nodeSelectorTerms:
                    - matchExpressions:
                        - key: node_role.e2e.grove.nvidia.com
                          operator: In
                          values:
                            - agent
            tolerations:
              - key: node_role.e2e.grove.nvidia.com
                operator: Equal
                value: agent
                effect: NoSchedule
            containers:
              - name: worker
                image: registry:5001/busybox:latest
                command: ["sleep", "infinity"]
                resources:
                  requests:
                    memory: 10Mi
