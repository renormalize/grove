# Scale Down Test (-50%)
# Starts at 500 PCS replicas (1000 pods); the test scales to 250 (500 pods).
---
apiVersion: grove.io/v1alpha1
kind: PodCliqueSet
metadata:
  name: scale-down
  labels:
    app: scale-down
spec:
  replicas: 500
  template:
    cliques:
      - name: expert-worker
        spec:
          roleName: expert
          replicas: 2
          minAvailable: 2
          podSpec:
            schedulerName: default-scheduler
            affinity:
              nodeAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  nodeSelectorTerms:
                    - matchExpressions:
                        - key: type
                          operator: In
                          values:
                            - kwok
            tolerations:
              - key: node_role.e2e.grove.nvidia.com
                operator: Equal
                value: agent
                effect: NoSchedule
            containers:
              - name: expert-worker
                image: registry:5001/nginx:alpine-slim
                resources:
                  requests:
                    memory: 1Mi
