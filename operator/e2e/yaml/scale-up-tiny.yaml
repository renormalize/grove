# Scale Up Test: tiny sanity variant
# Starts at replicas: 0; the test scales to 5 PCS replicas (10 pods).
# Used to validate cluster + test plumbing end-to-end without paying the cost
# of the real 500/1000-pod scenarios.
---
apiVersion: grove.io/v1alpha1
kind: PodCliqueSet
metadata:
  name: scale-up-tiny
  labels:
    app: scale-up-tiny
spec:
  replicas: 0
  template:
    cliques:
      - name: expert-worker
        spec:
          roleName: expert
          replicas: 2
          minAvailable: 2
          podSpec:
            schedulerName: default-scheduler
            affinity:
              nodeAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  nodeSelectorTerms:
                    - matchExpressions:
                        - key: type
                          operator: In
                          values:
                            - kwok
            tolerations:
              - key: node_role.e2e.grove.nvidia.com
                operator: Equal
                value: agent
                effect: NoSchedule
            containers:
              - name: expert-worker
                image: registry:5001/nginx:alpine-slim
                resources:
                  requests:
                    memory: 1Mi
