# Workload for the legacy-to-canonical hash migration upgrade test.
---
apiVersion: grove.io/v1alpha1
kind: PodCliqueSet
metadata:
  name: legacy-hash-migration
  labels:
    app: legacy-hash-migration
spec:
  replicas: 1
  template:
    cliques:
      - name: z-standalone
        labels:
          compat.grove.io/hash-role: standalone
          kai.scheduler/queue: test
        spec:
          roleName: standalone
          replicas: 1
          minAvailable: 1
          podSpec:
            terminationGracePeriodSeconds: 5
            containers:
              - name: sidecar
                image: registry:5001/busybox:latest
                command: ["sleep", "infinity"]
                volumeMounts:
                  - name: shared
                    mountPath: /shared
                  - name: cache
                    mountPath: /cache
                resources:
                  requests:
                    memory: 16Mi
              - name: main
                image: registry:5001/busybox:latest
                command: ["sleep", "infinity"]
                volumeMounts:
                  - name: shared
                    mountPath: /shared
                  - name: cache
                    mountPath: /cache
                resources:
                  requests:
                    memory: 16Mi
            volumes:
              - name: shared
                emptyDir: {}
              - name: cache
                emptyDir: {}
      - name: a-grouped
        labels:
          compat.grove.io/hash-role: grouped
          kai.scheduler/queue: test
        spec:
          roleName: grouped
          replicas: 1
          minAvailable: 1
          podSpec:
            terminationGracePeriodSeconds: 5
            containers:
              - name: sidecar
                image: registry:5001/busybox:latest
                command: ["sleep", "infinity"]
                volumeMounts:
                  - name: shared
                    mountPath: /shared
                  - name: cache
                    mountPath: /cache
                resources:
                  requests:
                    memory: 16Mi
              - name: main
                image: registry:5001/busybox:latest
                command: ["sleep", "infinity"]
                volumeMounts:
                  - name: shared
                    mountPath: /shared
                  - name: cache
                    mountPath: /cache
                resources:
                  requests:
                    memory: 16Mi
            volumes:
              - name: shared
                emptyDir: {}
              - name: cache
                emptyDir: {}
    podCliqueScalingGroups:
      - name: sg
        replicas: 1
        minAvailable: 1
        cliqueNames:
          - a-grouped
