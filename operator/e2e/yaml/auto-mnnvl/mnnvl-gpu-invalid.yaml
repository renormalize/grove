# MNNVL E2E: Simple GPU PCS with an invalid mnnvl-group value (contains spaces)
# Used by: testInvalidAnnotationRejected
---
apiVersion: grove.io/v1alpha1
kind: PodCliqueSet
metadata:
  name: mnnvl-gpu-invalid
  annotations:
    grove.io/mnnvl-group: "invalid value with spaces"
spec:
  replicas: 1
  template:
    terminationDelay: 1s
    cliques:
      - name: gpu-worker
        spec:
          roleName: gpu-worker
          replicas: 1
          minAvailable: 1
          podSpec:
            containers:
              - name: gpu-container
                image: busybox:latest
                command: ["sleep", "infinity"]
                resources:
                  limits:
                    nvidia.com/gpu: "1"
